# XcodeGen-конфіг. На Mac: `brew install xcodegen` → `xcodegen generate` → відкрити GridMonitor.xcodeproj
name: GridMonitor
options:
  bundleIdPrefix: com.gridmonitor
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  GridMonitor:
    type: application
    platform: iOS
    sources:
      - GridMonitor
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.gridmonitor.app
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
    info:
      path: GridMonitor/Info.plist
      properties:
        CFBundleDisplayName: Моніторинг мережі
        UIBackgroundModes:
          - fetch
          - processing
        BGTaskSchedulerPermittedIdentifiers:
          - com.gridmonitor.grid-refresh
        # Бекенд працює по HTTPS; ATS лишаємо за замовчуванням (увімкненим).

  GridMonitorTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - GridMonitorTests
    dependencies:
      - target: GridMonitor
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.gridmonitor.tests

schemes:
  GridMonitor:
    build:
      targets:
        GridMonitor: all
        GridMonitorTests: [test]
    test:
      targets:
        - GridMonitorTests
