name: Bot CI

on:
  push:
    paths:
      - 'bot/**'
      - '.github/workflows/bot-ci.yml'
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: pip install -r bot/requirements.txt pytest
      - name: Syntax check
        run: python -m compileall bot/src
      - name: Run tests
        run: pytest bot/tests -q
