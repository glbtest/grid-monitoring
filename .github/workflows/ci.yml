name: iOS Build & Test

# Збірка й тести застосунку на macOS-раннері GitHub (перевірка з будь-якої ОС, без власного Mac).
on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  # Кросплатформні тести чистого ядра (те саме працює на Windows: swift test).
  core-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.0"
      - name: swift test (GridMonitorCore)
        run: swift test --package-path Packages/GridMonitorCore

  build-test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v5

      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Versions
        run: |
          xcodebuild -version
          swift --version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: List available simulators
        run: xcrun simctl list devices available | grep -i iphone || true

      - name: Build & run tests
        run: |
          set -o pipefail
          xcodebuild test \
            -project GridMonitor.xcodeproj \
            -scheme GridMonitor \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            CODE_SIGNING_ALLOWED=NO 2>&1 | tee build.log

      - name: Compile errors (only on failure)
        if: failure()
        run: |
          echo "=== ERRORS ==="
          grep -nE "error:" build.log | sort -u | head -100 || echo "no 'error:' lines found"
