name: Build unsigned IPA (AltStore)

# Збирає НЕпідписаний .ipa для бічного встановлення через AltStore/SideStore
# (безкоштовний Apple ID, без платного акаунта). Артефакт можна завантажити з цього запуску.
on:
  workflow_dispatch:
  push:
    tags: ['v*']

jobs:
  ipa:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v5

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Archive (unsigned)
        run: |
          set -o pipefail
          xcodebuild archive \
            -project GridMonitor.xcodeproj \
            -scheme GridMonitor \
            -configuration Release \
            -sdk iphoneos \
            -archivePath "$RUNNER_TEMP/GridMonitor.xcarchive" \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY=""

      - name: Package .ipa
        run: |
          set -e
          APP="$RUNNER_TEMP/GridMonitor.xcarchive/Products/Applications/GridMonitor.app"
          test -d "$APP" || { echo "::error::GridMonitor.app not found in archive"; exit 1; }
          rm -rf "$RUNNER_TEMP/Payload" && mkdir -p "$RUNNER_TEMP/Payload"
          cp -R "$APP" "$RUNNER_TEMP/Payload/"
          (cd "$RUNNER_TEMP" && zip -qry GridMonitor-unsigned.ipa Payload)
          echo "Built: $RUNNER_TEMP/GridMonitor-unsigned.ipa"

      - uses: actions/upload-artifact@v4
        with:
          name: GridMonitor-unsigned-ipa
          path: ${{ runner.temp }}/GridMonitor-unsigned.ipa
          if-no-files-found: error
          retention-days: 14
